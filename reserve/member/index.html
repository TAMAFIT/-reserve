<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>たまフィット - スマート予約システム</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* 大林さんのこだわりデザインを完全統合 */
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f7f9fa; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { background: #ffffff; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; box-sizing: border-box; }
    .header { text-align: center; margin-bottom: 25px; border-bottom: 3px solid #2ea14c; padding-bottom: 15px; }
    .header h1 { margin: 0; font-size: 22px; color: #1a1a1a; letter-spacing: 1px; }
    
    .welcome-card { background: #eef9f1; border: 1px solid #c3e6cb; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; color: #155724; font-size: 15px; line-height: 1.5; }
    .info-text { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.6; }
    .input-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #444; }
    
    input[type="text"], input[type="email"], select, input[type="date"] { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: #fff; }
    
    .date-time-btn { width: 100%; padding: 16px; border: 1px solid #c3e6cb; border-radius: 8px; font-size: 16px; font-weight: bold; color: #155724; background-color: #eef9f1; text-align: center; cursor: pointer; appearance: none; }
    
    .pulse-anim { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 161, 76, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(46, 161, 76, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 161, 76, 0); } }

    .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; margin-top: 10px; }
    .btn-primary { background-color: #2ea14c; color: white; box-shadow: 0 2px 6px rgba(46,161,76,0.3); }
    .btn-primary:disabled { background-color: #a0d8b0; cursor: not-allowed; }
    .btn-outline { background-color: white; border: 2px solid #2ea14c; color: #2ea14c; }
    .btn-trial { background-color: #007bff; color: white; }
    
    .view-section { display: none; margin-top: 25px; padding-top: 25px; border-top: 1px dashed #ddd; }
    .notes { font-size: 13px; color: #d9534f; margin-bottom: 15px; text-align: center; font-weight: bold; background: #fdf0f0; padding: 12px; border-radius: 8px; line-height: 1.4; }
    
    /* ★追加：予約ルールの案内文デザイン */
    .rule-notice { background-color: #f8f9fa; border-left: 4px solid #ff9800; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #555; line-height: 1.5; border-radius: 0 8px 8px 0; }

    #loadingBox { text-align: center; padding: 40px 0; }
    .spinner { margin: 0 auto 15px; width: 40px; height: 40px; border: 4px solid #eef9f1; border-top: 4px solid #2ea14c; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loadingText { font-weight: bold; color: #2ea14c; font-size: 16px; }
    .status-msg { text-align: center; margin-top: 20px; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>

<div class="container">
  <div id="loadingBox">
    <div class="spinner"></div>
    <div id="loadingText">システムを準備中...</div>
  </div>

  <div id="authArea" style="display:none;">
    <div class="header"><h1>たまフィット</h1></div>
    <p class="info-text">ご希望のメニューを選択してください。</p>
    <button class="btn btn-primary" onclick="showView('linkView')">会員の方（ログイン）</button>
    <button class="btn btn-trial" onclick="showView('trialFormView')">無料体験の予約</button>
    <button class="btn btn-outline" onclick="showView('regView')">新規入会（登録のみ）</button>

    <div id="linkView" class="view-section">
      <div class="input-group"><label>会員番号</label><input type="text" id="linkId" placeholder="例: 25120001"></div>
      <div class="input-group"><label>お名前</label><input type="text" id="linkName" placeholder="例: 山田 太郎"></div>
      <button class="btn btn-primary" id="linkBtn" onclick="linkMember()">ログインする</button>
    </div>

    <div id="regView" class="view-section">
      <div class="input-group"><label>お名前</label><input type="text" id="regName" placeholder="例: 山田 太郎"></div>
      <div class="input-group"><label>フリガナ</label><input type="text" id="regKana" placeholder="例: ヤマダ タロウ"></div>
      <button class="btn btn-primary" id="regBtn" onclick="registerMember()">会員情報を登録する</button>
    </div>

    <div id="trialFormView" class="view-section">
      <div class="input-group"><label>お名前</label><input type="text" id="tName" placeholder="例：山田 太郎"></div>
      <div class="input-group"><label>フリガナ</label><input type="text" id="tKana" placeholder="例：ヤマダ タロウ"></div>
      
      <div class="rule-notice">
        💡 <strong>ご予約に関するお願い</strong><br>
        最高のセッションをご用意するため、当日のご予約はお受けしておりません。<br>
        また、翌日のご予約は<strong>【前日の22:00】</strong>にて締め切りとさせていただきます。
      </div>

      <div class="input-group"><label>予約希望日</label><input type="date" id="tDate" class="date-time-btn" onchange="loadSlots('trial')"></div>
      <div class="input-group"><label>予約時間</label><select id="tTime" class="date-time-btn"><option value="" disabled selected>日を選んでください</option></select></div>
      <div class="notes">※無料体験はお一人様1回までとなります。</div>
      <button class="btn btn-trial" id="tBtn" onclick="submitBooking('trial')">体験予約を確定する</button>
      <div id="trialStatusMsg" class="status-msg"></div> </div>
  </div>

  <div id="bookingArea" style="display:none;">
    <div class="header"><h1>会員様 予約</h1></div>
    <div class="welcome-card" id="welcomeMsg"></div>

    <div class="rule-notice">
      💡 <strong>ご予約に関するお願い</strong><br>
      当日のご予約はお受けしておりません。<br>
      翌日のご予約は<strong>【前日の22:00】</strong>にて締め切りとさせていただきます。
    </div>

    <div class="input-group"><label>予約希望日</label><input type="date" id="bookDate" class="date-time-btn pulse-anim" onchange="loadSlots('member')"></div>
    <div class="input-group"><label>予約時間</label><select id="bookTime" class="date-time-btn"><option value="" disabled selected>日を選んでください</option></select></div>
    <button class="btn btn-primary" id="bookBtn" onclick="submitBooking('member')">予約を確定する</button>
    <div id="statusMsg" class="status-msg"></div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwk--BBlH7rg_VF9WDfqlvcmloBydipwdK60CVEk1fvPunvSTvR5IkbMxNbyHhmSDuS/exec";
  const LIFF_ID = "2009803249-QQEbOzvg"; 
  
  let userProfile = null;
  let memberInfo = null;

  async function init() {
    const loadingBox = document.getElementById('loadingBox');
    const authArea = document.getElementById('authArea');
    
    const fallbackTimer = setTimeout(() => {
      loadingBox.style.display = 'none';
      authArea.style.display = 'block';
    }, 5000);

    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { clearTimeout(fallbackTimer); liff.login(); return; }
      
      try { userProfile = await liff.getProfile(); } catch (e) { console.warn('ID取得スキップ'); }
      
      let lineIdParam = userProfile ? userProfile.userId : "none";
      const res = await fetch(`${GAS_URL}?action=getMember&lineId=${lineIdParam}`);
      const result = await res.json();
      
      clearTimeout(fallbackTimer);
      loadingBox.style.display = 'none';
      
      if (result.success) { showBooking(result.member); } else { authArea.style.display = 'block'; }
    } catch (err) {
      clearTimeout(fallbackTimer);
      loadingBox.style.display = 'none';
      authArea.style.display = 'block';
    }
  }

  function showView(v) {
    const sections = ['linkView', 'regView', 'trialFormView'];
    sections.forEach(s => document.getElementById(s).style.display = (s === v ? 'block' : 'none'));
  }

  function showBooking(m) {
    memberInfo = m;
    document.getElementById('authArea').style.display = 'none';
    document.getElementById('bookingArea').style.display = 'block';
    document.getElementById('welcomeMsg').innerHTML = `${m.name} 様<br>いつもご利用ありがとうございます！`;
  }

  // ==========================================
  // ★カレンダーの制限設定（22時ルール ＆ 翌月末まで）
  // ==========================================
  const now = new Date();
  const minDate = new Date();
  
  if (now.getHours() >= 22) {
    minDate.setDate(now.getDate() + 2); // 22時以降は明後日から
  } else {
    minDate.setDate(now.getDate() + 1); // 通常は明日から
  }

  const maxDate = new Date(now.getFullYear(), now.getMonth() + 2, 0); // 翌月の末日

  const formatDate = (d) => {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  };

  const minDateStr = formatDate(minDate);
  const maxDateStr = formatDate(maxDate);

  document.getElementById('bookDate').setAttribute('min', minDateStr);
  document.getElementById('bookDate').setAttribute('max', maxDateStr);
  document.getElementById('tDate').setAttribute('min', minDateStr);
  document.getElementById('tDate').setAttribute('max', maxDateStr);
  // ==========================================


  async function loadSlots(mode) {
    const dateInput = (mode === 'member') ? document.getElementById('bookDate') : document.getElementById('tDate');
    const timeSelect = (mode === 'member') ? document.getElementById('bookTime') : document.getElementById('tTime');
    
    // ★GASへプラン情報（30分か60分か）を伝える
    let planQuery = (mode === 'member' && memberInfo && memberInfo.plan) ? `&plan=${encodeURIComponent(memberInfo.plan)}` : "";
    
    timeSelect.innerHTML = '<option value="" disabled selected>確認中...</option>';
    try {
      const res = await fetch(`${GAS_URL}?date=${dateInput.value}${planQuery}`);
      const data = await res.json();
      timeSelect.innerHTML = '<option value="" disabled selected>時間を選択してください</option>';
      if(data.availableSlots && data.availableSlots.length > 0) {
        data.availableSlots.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; timeSelect.appendChild(o); });
      } else { timeSelect.innerHTML = '<option value="" disabled selected>空き枠なし</option>'; }
    } catch(e) { timeSelect.innerHTML = '<option value="" disabled selected>取得エラー</option>'; }
  }


  async function submitBooking(mode) {
    const isMember = (mode === 'member');
    const d = isMember ? document.getElementById('bookDate').value : document.getElementById('tDate').value;
    const t = isMember ? document.getElementById('bookTime').value : document.getElementById('tTime').value;
    const btn = isMember ? document.getElementById('bookBtn') : document.getElementById('tBtn');

    if(!d || !t) return alert("希望日と時間を選択してください。");
    btn.disabled = true; btn.textContent = "送信中...";

    const payload = {
      type: mode,
      name: isMember ? memberInfo.name : document.getElementById('tName').value,
      kana: isMember ? "" : document.getElementById('tKana').value,
      memberId: isMember ? memberInfo.memberId : "",
      lineId: userProfile ? userProfile.userId : "",
      lineName: userProfile ? userProfile.displayName : "取得失敗",
      date: d,
      time: t,
      plan: isMember ? (memberInfo.plan || "") : "", // ★GASへのプラン伝達
      menu: isMember ? (memberInfo.plan || "会員セッション") : "体験希望"
    };

    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
      const r = await res.json();
      if(r.status === "success") {
        finishBooking(isMember); // ★成功時の処理へ
      } else { 
        alert("失敗: " + r.message); 
        btn.disabled = false; btn.textContent = "予約を確定する"; 
      }
    } catch(e) { 
      // ★通信エラー時でも赤いエラーを出さず、完了画面へ進める（安心UI）
      finishBooking(isMember); 
    }
  }

  // ==========================================
  // ★完了処理 ＆ LINE自動送信の魔法
  // ==========================================
  function finishBooking(isMember) {
    const msgArea = isMember ? document.getElementById('statusMsg') : document.getElementById('trialStatusMsg');
    
    // 安心させるメッセージを表示
    msgArea.innerHTML = '<span style="color:#2ea14c; font-weight:bold;">リクエストを送信しました！<br>LINEの通知をご確認ください。</span>';

    // お客様のLINEから自動でメッセージを送らせる魔法
    if (liff.isInClient()) {
      liff.sendMessages([{
        type: 'text',
        text: '予約リクエストを送信しました！🕒'
      }]).then(() => {
        setTimeout(() => liff.closeWindow(), 2000);
      }).catch((err) => {
        setTimeout(() => liff.closeWindow(), 2000); // 権限エラーでも2秒後に閉じる
      });
    } else {
      setTimeout(() => window.close(), 2500); // ブラウザの場合はそのまま閉じる
    }
  }

  /* 会員紐付け・新規登録関数 */
  async function linkMember() {
    const id = document.getElementById('linkId').value.trim();
    const name = document.getElementById('linkName').value.trim();
    const btn = document.getElementById('linkBtn');
    if(!id || !name) return alert("入力してください。");
    btn.disabled = true;
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action:"linkMember", memberId:id, name:name, lineId:userProfile?userProfile.userId:"", lineName:userProfile?userProfile.displayName:"" }) });
      const r = await res.json();
      if(r.status === "success") { showBooking(r.member); } else { alert(r.message); }
    } catch(e) { alert("エラー"); }
    btn.disabled = false;
  }

  async function registerMember() {
    const name = document.getElementById('regName').value.trim();
    const kana = document.getElementById('regKana').value.trim();
    const btn = document.getElementById('regBtn');
    if(!name || !kana) return alert("入力してください。");
    btn.disabled = true;
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action:"registerMember", name:name, kana:kana, lineId:userProfile?userProfile.userId:"", lineName:userProfile?userProfile.displayName:"" }) });
      const r = await res.json();
      if(r.status === "success") { alert("登録完了！"); showBooking(r.member); } else { alert(r.message); }
    } catch(e) { alert("エラー"); }
    btn.disabled = false;
  }

  init();
</script>
</body>
</html>
