<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>たまフィット - 会員様専用予約</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* スマホ（LINE内）で綺麗に見せるための基本設定 */
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f7f9fa; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { background: #ffffff; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; box-sizing: border-box; }
    .header { text-align: center; margin-bottom: 25px; border-bottom: 3px solid #2ea14c; padding-bottom: 15px; }
    .header h1 { margin: 0; font-size: 22px; color: #1a1a1a; letter-spacing: 1px; }
    
    /* 案内メッセージのカード */
    .welcome-card { background: #eef9f1; border: 1px solid #c3e6cb; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; color: #155724; font-size: 15px; line-height: 1.5; }
    .info-text { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.6; }
    
    /* 入力フォームとボタン */
    .input-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #444; }
    input[type="text"], input[type="date"], select { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; appearance: none; }
    
    .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
    .btn-primary { background-color: #2ea14c; color: white; box-shadow: 0 2px 6px rgba(46,161,76,0.3); }
    .btn-primary:disabled { background-color: #a0d8b0; cursor: not-allowed; box-shadow: none; }
    .btn-outline { background-color: white; border: 2px solid #2ea14c; color: #2ea14c; margin-top: 10px; }
    
    /* セクションの切り替え用 */
    .view-section { display: none; margin-top: 25px; padding-top: 25px; border-top: 1px dashed #ddd; }
    #loading { text-align: center; padding: 50px 0; font-weight: bold; color: #2ea14c; }
    #statusMsg { text-align: center; margin-top: 20px; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>

<div class="container">
  <div id="loading">会員情報を確認中...</div>

  <div id="authArea" style="display:none;">
    <div class="header">
      <h1>たまフィット</h1>
    </div>
    <p class="info-text">会員情報の確認ができませんでした。<br>該当する方を選択して登録を完了してください。</p>
    
    <button class="btn btn-primary" onclick="showView('linkView')">会員番号をお持ちの方</button>
    <button class="btn btn-outline" onclick="showView('regView')">はじめての方（新規登録）</button>

    <div id="linkView" class="view-section">
      <div class="input-group">
        <label>会員番号</label>
        <input type="text" id="linkId" placeholder="例: 25120001">
      </div>
      <div class="input-group">
        <label>お名前（フルネーム）</label>
        <input type="text" id="linkName" placeholder="例: 大林 誠也">
      </div>
      <button class="btn btn-primary" id="linkBtn" onclick="linkMember()">LINEと連携する</button>
    </div>

    <div id="regView" class="view-section">
      <div class="input-group">
        <label>お名前（フルネーム）</label>
        <input type="text" id="regName" placeholder="例: 大林 誠也">
      </div>
      <div class="input-group">
        <label>フリガナ</label>
        <input type="text" id="regKana" placeholder="例: オオバヤシ セイヤ">
      </div>
      <button class="btn btn-primary" id="regBtn" onclick="registerMember()">会員情報を登録する</button>
    </div>
  </div>

  <div id="bookingArea" style="display:none;">
    <div class="header">
      <h1>たまフィット 予約</h1>
    </div>
    
    <div class="welcome-card" id="welcomeMsg"></div>
    
    <div class="input-group">
      <label>予約希望日</label>
      <input type="date" id="bookDate" onchange="loadSlots()">
    </div>
    
    <div class="input-group">
      <label>予約時間</label>
      <select id="bookTime">
        <option value="" disabled selected>日にちを先に選んでください</option>
      </select>
    </div>
    
    <button class="btn btn-primary" id="bookBtn" onclick="submitBooking()">予約を確定する</button>
    <div id="statusMsg"></div>
  </div>
</div>

<script>
  // 大林さんの環境設定
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwk--BBlH7rg_VF9WDfqlvcmloBydipwdK60CVEk1fvPunvSTvR5IkbMxNbyHhmSDuS/exec";
  const LIFF_ID = "2009803249-QQEbOzvg";
  
  let userProfile = null;
  let memberInfo = null;

  // 初期化とLINE連携チェック
  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      
      const res = await fetch(`${GAS_URL}?action=getMember&lineId=${userProfile.userId}`);
      const result = await res.json();
      
      document.getElementById('loading').style.display = 'none';
      
      if (result.success) {
        showBooking(result.member);
      } else {
        document.getElementById('authArea').style.display = 'block';
      }
    } catch (err) {
      alert("通信エラーが発生しました。もう一度お試しください。");
      console.error(err);
    }
  }

  // 連携・登録の表示切り替え
  function showView(v) {
    document.getElementById('linkView').style.display = (v === 'linkView' ? 'block' : 'none');
    document.getElementById('regView').style.display = (v === 'regView' ? 'block' : 'none');
  }

  // 予約画面の表示（過去日付防止の設定もここ）
  function showBooking(m) {
    memberInfo = m;
    document.getElementById('authArea').style.display = 'none';
    document.getElementById('bookingArea').style.display = 'block';
    document.getElementById('welcomeMsg').innerHTML = `${m.name} 様<br>いつもご利用ありがとうございます！`;
    
    // 今日より前の日付を選択できないようにする安全装置
    document.getElementById('bookDate').setAttribute('min', new Date().toISOString().split('T')[0]);
  }

  // 【API】既存番号との連携
  async function linkMember() {
    const id = document.getElementById('linkId').value.trim();
    const name = document.getElementById('linkName').value.trim();
    if(!id || !name) return alert("すべての項目を入力してください。");
    
    const btn = document.getElementById('linkBtn');
    btn.disabled = true;
    btn.textContent = "連携中...";
    
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action:"linkMember", memberId:id, name:name, lineId:userProfile.userId }) });
      const r = await res.json();
      if(r.status === "success") { 
        showBooking(r.member); 
      } else { 
        alert(r.message); 
      }
    } catch(e) { alert("エラーが発生しました。"); }
    
    btn.disabled = false;
    btn.textContent = "LINEと連携する";
  }

  // 【API】新規登録
  async function registerMember() {
    const name = document.getElementById('regName').value.trim();
    const kana = document.getElementById('regKana').value.trim();
    if(!name || !kana) return alert("すべての項目を入力してください。");
    
    const btn = document.getElementById('regBtn');
    btn.disabled = true;
    btn.textContent = "登録中...";
    
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action:"registerMember", name:name, kana:kana, lineId:userProfile.userId }) });
      const r = await res.json();
      if(r.status === "success") { 
        alert("登録が完了しました！続けて予約を行えます。");
        showBooking(r.member); 
      } else { 
        alert(r.message); 
      }
    } catch(e) { alert("エラーが発生しました。"); }
    
    btn.disabled = false;
    btn.textContent = "会員情報を登録する";
  }

  // 【API】空き時間の取得
  async function loadSlots() {
    const d = document.getElementById('bookDate').value;
    const s = document.getElementById('bookTime');
    s.innerHTML = '<option value="" disabled selected>確認中...</option>';
    
    try {
      const res = await fetch(`${GAS_URL}?date=${d}`);
      const data = await res.json();
      s.innerHTML = '<option value="" disabled selected>時間を選択してください</option>';
      if(data.availableSlots && data.availableSlots.length > 0) {
        data.availableSlots.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; s.appendChild(o); });
      } else { 
        s.innerHTML = '<option value="" disabled selected>空き枠がありません</option>'; 
      }
    } catch(e) { s.innerHTML = '<option value="" disabled selected>取得エラー</option>'; }
  }

  // 【API】予約の確定
  async function submitBooking() {
    const d = document.getElementById('bookDate').value;
    const t = document.getElementById('bookTime').value;
    if(!d || !t) return alert("希望日と時間を選択してください。");
    
    const btn = document.getElementById('bookBtn');
    btn.disabled = true;
    btn.textContent = "送信中...";
    
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type:"member", memberId:memberInfo.memberId, name:memberInfo.name, lineId:userProfile.userId, date:d, time:t, menu:memberInfo.plan }) });
      const r = await res.json();
      if(r.status === "success") {
        document.getElementById('statusMsg').innerHTML = '<span style="color:#2ea14c;">予約が完了しました！<br>LINEをご確認ください。</span>';
        setTimeout(() => liff.closeWindow(), 2500);
      } else {
        alert("予約に失敗しました。");
        btn.disabled = false;
        btn.textContent = "予約を確定する";
      }
    } catch(e) { alert("通信エラーが発生しました。"); btn.disabled = false; btn.textContent = "予約を確定する"; }
  }

  // 画面ロード時に実行
  init();
</script>
</body>
</html>
