<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>たまフィット - スマート予約システム</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <style>
    /* ★ 背景画像とフォントの設定 */
    body { 
      font-family: 'Noto Sans JP', sans-serif; 
      /* 背景画像を全面に敷く */
      background: url('../../images/18.webp') no-repeat center center fixed; 
      background-size: cover;
      color: #333; 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* ★ すりガラス効果（グラスモーフィズム） */
    .container { 
      background: rgba(255, 255, 255, 0.85); /* ほんのり透ける白 */
      backdrop-filter: blur(15px) saturate(120%); /* すりガラスのぼかし */
      -webkit-backdrop-filter: blur(15px) saturate(120%); /* Safari対応 */
      border: 1px solid rgba(255, 255, 255, 0.6); /* 白いフチドリでリッチに */
      padding: 30px 20px; 
      border-radius: 16px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
      width: 100%; 
      max-width: 450px; 
      box-sizing: border-box; 
      align-self: flex-start;
      margin-top: 2vh;
    }

    .header { text-align: center; margin-bottom: 25px; border-bottom: 3px solid #2ea14c; padding-bottom: 15px; }
    .header h1 { margin: 0; font-size: 22px; color: #1a1a1a; letter-spacing: 1px; font-weight: 900; }
    
    .welcome-card { background: rgba(238, 249, 241, 0.9); border: 1px solid #c3e6cb; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; color: #155724; font-size: 15px; line-height: 1.5; }
    .info-text { text-align: center; font-size: 14px; color: #333; margin-bottom: 20px; line-height: 1.6; font-weight: bold; }
    .input-group { margin-bottom: 20px; }
    
    /* ★ ラベルにアイコンを並べるためのFlexbox設定 */
    label { display: flex; align-items: center; gap: 4px; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #444; }
    .icon-label { color: #2ea14c; font-size: 18px; }
    
    input[type="text"], input[type="email"], select, input[type="date"] { 
      width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: rgba(255, 255, 255, 0.95); font-family: inherit; transition: 0.3s;
    }
    input:focus, select:focus { outline: none; border-color: #2ea14c; box-shadow: 0 0 0 3px rgba(46,161,76,0.2); }
    
    .date-time-btn { width: 100%; padding: 16px; border: 1px solid #c3e6cb; border-radius: 8px; font-size: 16px; font-weight: bold; color: #155724; background-color: rgba(238, 249, 241, 0.9); text-align: center; cursor: pointer; appearance: none; font-family: inherit; }
    
    .pulse-anim { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 161, 76, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(46, 161, 76, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 161, 76, 0); } }

    /* ★ ボタンのデザイン強化（アイコン配置用Flexbox） */
    .btn { width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; }
    .btn-primary { background-color: #2ea14c; color: white; padding: 16px; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 10px rgba(46,161,76,0.3); }
    .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(46,161,76,0.3); }
    .btn-primary:disabled { background-color: #a0d8b0; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .btn-trial-main { background-color: #007bff; color: white; padding: 20px; font-size: 18px; box-shadow: 0 6px 15px rgba(0,123,255,0.35); width: 100%; margin-top: 10px; }
    .btn-trial-main:active { transform: translateY(2px); box-shadow: 0 3px 8px rgba(0,123,255,0.35); }
    
    .btn-outline { background-color: rgba(255, 255, 255, 0.5); border: 2px solid #2ea14c; color: #2ea14c; padding: 14px; font-size: 14px; width: 100%; margin-bottom: 12px; }
    .btn-outline-gray { background-color: rgba(255, 255, 255, 0.5); border: 2px solid #888; color: #888; padding: 14px; font-size: 14px; width: 100%; }
    
    .view-section { display: none; margin-top: 25px; padding-top: 25px; border-top: 1px dashed rgba(0,0,0,0.1); }
    .notes { font-size: 13px; color: #d9534f; margin-bottom: 15px; text-align: center; font-weight: bold; background: rgba(253, 240, 240, 0.9); padding: 12px; border-radius: 8px; line-height: 1.4; border: 1px solid #f5c6cb; }
    
    .reservation-rule { font-size: 12px; color: #666; text-align: center; margin-bottom: 8px; letter-spacing: 0.5px; font-weight: bold; }

    #loadingBox { text-align: center; padding: 40px 0; }
    .spinner { margin: 0 auto 15px; width: 40px; height: 40px; border: 4px solid #eef9f1; border-top: 4px solid #2ea14c; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loadingText { font-weight: bold; color: #2ea14c; font-size: 16px; }
    .status-msg { text-align: center; margin-top: 20px; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>

<div class="container">
  <div id="loadingBox">
    <div class="spinner"></div>
    <div id="loadingText">システムを準備中...</div>
  </div>

  <div id="authArea" style="display:none;">
    <div class="header"><h1>たまフィット</h1></div>
    
    <p class="info-text">初めての方は「無料体験」をご予約ください。</p>
    <button class="btn btn-trial-main" onclick="showView('trialFormView')">
      <i class="material-icons-round">card_giftcard</i> 無料体験を予約する
    </button>

    <div style="margin-top: 35px; padding-top: 20px; border-top: 1px dashed rgba(0,0,0,0.1);">
      <p style="font-size: 12px; color: #666; text-align: center; margin-bottom: 15px; font-weight: bold;">すでに会員の方・ご入会手続きのみの方</p>
      <button class="btn btn-outline" onclick="showView('linkView')">
        <i class="material-icons-round">login</i> 会員の方（ログイン）
      </button>
      <button class="btn btn-outline-gray" onclick="showView('regView')">
        <i class="material-icons-round">person_add</i> 新規入会（登録のみ）
      </button>
    </div>

    <div id="linkView" class="view-section">
      <div class="input-group">
        <label><i class="material-icons-round icon-label">badge</i> 会員番号</label>
        <input type="text" id="linkId" placeholder="例: 25120001">
      </div>
      <div class="input-group">
        <label><i class="material-icons-round icon-label">person</i> お名前</label>
        <input type="text" id="linkName" placeholder="例: 山田 太郎">
      </div>
      <button class="btn btn-primary" id="linkBtn" onclick="linkMember()">
        <i class="material-icons-round">check_circle</i> ログインする
      </button>
    </div>

    <div id="regView" class="view-section">
      <div class="input-group">
        <label><i class="material-icons-round icon-label">person</i> お名前</label>
        <input type="text" id="regName" placeholder="例: 山田 太郎">
      </div>
      <div class="input-group">
        <label><i class="material-icons-round icon-label">sort_by_alpha</i> フリガナ</label>
        <input type="text" id="regKana" placeholder="例: ヤマダ タロウ">
      </div>
      <button class="btn btn-primary" id="regBtn" onclick="registerMember()">
        <i class="material-icons-round">how_to_reg</i> 会員情報を登録する
      </button>
    </div>

    <div id="trialFormView" class="view-section">
      <div class="input-group">
        <label><i class="material-icons-round icon-label">person</i> お名前</label>
        <input type="text" id="tName" placeholder="例：山田 太郎">
      </div>
      <div class="input-group">
        <label><i class="material-icons-round icon-label">sort_by_alpha</i> フリガナ</label>
        <input type="text" id="tKana" placeholder="例：ヤマダ タロウ">
      </div>
      
      <div class="input-group">
        <label><i class="material-icons-round icon-label">event</i> 予約希望日</label>
        <input type="date" id="tDate" class="date-time-btn" onchange="loadSlots('trial')">
      </div>
      <div class="input-group">
        <label><i class="material-icons-round icon-label">schedule</i> 予約時間</label>
        <select id="tTime" class="date-time-btn"><option value="" disabled selected>日を選んでください</option></select>
      </div>
      <div class="notes">※無料体験はお一人様1回までとなります。</div>

      <div class="reservation-rule">当日予約不可 / 翌日予約は前日22:00締切</div>
      <button class="btn btn-trial-main" id="tBtn" onclick="submitBooking('trial')">
        <i class="material-icons-round">send</i> 体験予約を確定する
      </button>
      <div id="trialStatusMsg" class="status-msg"></div> 
    </div>
  </div>

  <div id="bookingArea" style="display:none;">
    <div class="header"><h1>会員様 予約</h1></div>
    <div class="welcome-card" id="welcomeMsg"></div>

    <div class="input-group">
      <label><i class="material-icons-round icon-label">event</i> 予約希望日</label>
      <input type="date" id="bookDate" class="date-time-btn pulse-anim" onchange="loadSlots('member')">
    </div>
    <div class="input-group">
      <label><i class="material-icons-round icon-label">schedule</i> 予約時間</label>
      <select id="bookTime" class="date-time-btn"><option value="" disabled selected>日を選んでください</option></select>
    </div>
    
    <div class="reservation-rule">当日予約不可 / 翌日予約は前日22:00締切</div>
    <button class="btn btn-primary" id="bookBtn" onclick="submitBooking('member')">
      <i class="material-icons-round">send</i> 予約を確定する
    </button>
    <div id="statusMsg" class="status-msg"></div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwk--BBlH7rg_VF9WDfqlvcmloBydipwdK60CVEk1fvPunvSTvR5IkbMxNbyHhmSDuS/exec";
  const LIFF_ID = "2009803249-QQEbOzvg"; 
  
  let userProfile = null;
  let memberInfo = null;

  async function init() {
    const loadingBox = document.getElementById('loadingBox');
    const authArea = document.getElementById('authArea');
    
    const fallbackTimer = setTimeout(() => {
      loadingBox.style.display = 'none';
      authArea.style.display = 'block';
    }, 5000);

    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { clearTimeout(fallbackTimer); liff.login(); return; }
      
      try { userProfile = await liff.getProfile(); } catch (e) { console.warn('ID取得スキップ'); }
      
      let lineIdParam = userProfile ? userProfile.userId : "none";
      const res = await fetch(`${GAS_URL}?action=getMember&lineId=${lineIdParam}`);
      const result = await res.json();
      
      clearTimeout(fallbackTimer);
      loadingBox.style.display = 'none';
      
      // ★修正箇所①：名前がしっかり存在する場合のみログイン許可
      if (result.success && result.member && result.member.name) { 
        showBooking(result.member); 
      } else { 
        authArea.style.display = 'block'; 
      }
    } catch (err) {
      clearTimeout(fallbackTimer);
      loadingBox.style.display = 'none';
      authArea.style.display = 'block';
    }
  }

  function showView(v) {
    const sections = ['linkView', 'regView', 'trialFormView'];
    sections.forEach(s => {
      const el = document.getElementById(s);
      if(el) el.style.display = (s === v ? 'block' : 'none');
    });
  }

  function showBooking(m) {
    memberInfo = m;
    document.getElementById('authArea').style.display = 'none';
    document.getElementById('bookingArea').style.display = 'block';
    document.getElementById('welcomeMsg').innerHTML = `${m.name} 様<br>いつもご利用ありがとうございます！`;
  }

  // カレンダーの制限設定（22時ルール ＆ 翌月末まで）
  const now = new Date();
  const minDate = new Date();
  
  if (now.getHours() >= 22) {
    minDate.setDate(now.getDate() + 2); // 22時以降は明後日から
  } else {
    minDate.setDate(now.getDate() + 1); // 通常は明日から
  }

  const maxDate = new Date(now.getFullYear(), now.getMonth() + 2, 0); // 翌月の末日

  const formatDate = (d) => {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  };

  const minDateStr = formatDate(minDate);
  const maxDateStr = formatDate(maxDate);

  document.getElementById('bookDate').setAttribute('min', minDateStr);
  document.getElementById('bookDate').setAttribute('max', maxDateStr);
  document.getElementById('tDate').setAttribute('min', minDateStr);
  document.getElementById('tDate').setAttribute('max', maxDateStr);

  async function loadSlots(mode) {
    const dateInput = (mode === 'member') ? document.getElementById('bookDate') : document.getElementById('tDate');
    const timeSelect = (mode === 'member') ? document.getElementById('bookTime') : document.getElementById('tTime');
    
    let planQuery = (mode === 'member' && memberInfo && memberInfo.plan) ? `&plan=${encodeURIComponent(memberInfo.plan)}` : "";
    
    timeSelect.innerHTML = '<option value="" disabled selected>確認中...</option>';
    try {
      const res = await fetch(`${GAS_URL}?date=${dateInput.value}${planQuery}`);
      const data = await res.json();
      timeSelect.innerHTML = '<option value="" disabled selected>時間を選択してください</option>';
      if(data.availableSlots && data.availableSlots.length > 0) {
        data.availableSlots.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; timeSelect.appendChild(o); });
      } else { timeSelect.innerHTML = '<option value="" disabled selected>空き枠なし</option>'; }
    } catch(e) { timeSelect.innerHTML = '<option value="" disabled selected>取得エラー</option>'; }
  }

  async function submitBooking(mode) {
    const isMember = (mode === 'member');
    const d = isMember ? document.getElementById('bookDate').value : document.getElementById('tDate').value;
    const t = isMember ? document.getElementById('bookTime').value : document.getElementById('tTime').value;
    const btn = isMember ? document.getElementById('bookBtn') : document.getElementById('tBtn');

    if(!d || !t) return alert("希望日と時間を選択してください。");
    btn.disabled = true; btn.textContent = "送信中...";

    // ★修正箇所②：menuに勝手に文字を入れず、空欄なら空欄のまま送る
    const payload = {
      type: mode,
      name: isMember ? memberInfo.name : document.getElementById('tName').value,
      kana: isMember ? "" : document.getElementById('tKana').value,
      memberId: isMember ? memberInfo.memberId : "",
      lineId: userProfile ? userProfile.userId : "",
      lineName: userProfile ? userProfile.displayName : "取得失敗",
      date: d,
      time: t,
      plan: isMember ? (memberInfo.plan || "") : "", 
      menu: isMember ? (memberInfo.plan || "") : "体験希望" 
    };

    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
      const r = await res.json();
      if(r.status === "success") {
        finishBooking(isMember); 
      } else { 
        alert("失敗: " + r.message); 
        btn.disabled = false; btn.textContent = "予約を確定する"; 
      }
    } catch(e) { 
      finishBooking(isMember); 
    }
  }

  // 完了処理 ＆ LINE自動送信の魔法
  function finishBooking(isMember) {
    const msgArea = isMember ? document.getElementById('statusMsg') : document.getElementById('trialStatusMsg');
    
    msgArea.innerHTML = '<span style="color:#2ea14c; font-weight:bold;">リクエストを送信しました！<br>LINEの通知をご確認ください。</span>';

    if (liff.isInClient()) {
      liff.sendMessages([{
        type: 'text',
        text: '予約リクエストを送信しました！🕒'
      }]).then(() => {
        setTimeout(() => liff.closeWindow(), 2000);
      }).catch((err) => {
        setTimeout(() => liff.closeWindow(), 2000); 
      });
    } else {
      setTimeout(() => window.close(), 2500); 
    }
  }

  /* 会員紐付け・新規登録関数 */
  async function linkMember() {
    const id = document.getElementById('linkId').value.trim();
    const name = document.getElementById('linkName').value.trim();
    const btn = document.getElementById('linkBtn');
    if(!id || !name) return alert("入力してください。");
    btn.disabled = true;
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action:"linkMember", memberId:id, name:name, lineId:userProfile?userProfile.userId:"", lineName:userProfile?userProfile.displayName:"" }) });
      const r = await res.json();
      if(r.status === "success") { showBooking(r.member); } else { alert(r.message); }
    } catch(e) { alert("エラー"); }
    btn.disabled = false;
  }

  async function registerMember() {
    const name = document.getElementById('regName').value.trim();
    const kana = document.getElementById('regKana').value.trim();
    const btn = document.getElementById('regBtn');
    if(!name || !kana) return alert("入力してください。");
    btn.disabled = true;
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action:"registerMember", name:name, kana:kana, lineId:userProfile?userProfile.userId:"", lineName:userProfile?userProfile.displayName:"" }) });
      const r = await res.json();
      if(r.status === "success") { alert("登録完了！"); showBooking(r.member); } else { alert(r.message); }
    } catch(e) { alert("エラー"); }
    btn.disabled = false;
  }

  init();
</script>
</body>
</html>
