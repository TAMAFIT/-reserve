<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>たまフィット - スマート予約システム</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18078211726"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'AW-18078211726');
  </script>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <style>
    body { 
      font-family: 'Noto Sans JP', sans-serif; 
      background: url('../../images/18.webp') no-repeat center center fixed; 
      background-size: cover;
      color: #333; 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      min-height: 100vh;
      box-sizing: border-box;
      align-items: center;
    }

    .container { 
      background: rgba(255, 255, 255, 0.6); 
      backdrop-filter: blur(15px) saturate(120%); 
      -webkit-backdrop-filter: blur(15px) saturate(120%); 
      border: 1px solid rgba(255, 255, 255, 0.7); 
      padding: 40px 20px; 
      border-radius: 16px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
      width: 100%; 
      max-width: 450px; 
      box-sizing: border-box; 
      margin: 2vh 0;
    }

    .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #2ea14c; padding-bottom: 15px; }
    .header h1 { margin: 0; font-size: 28px; color: #1a1a1a; letter-spacing: 2px; font-weight: 900; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); }
    
    .welcome-card { 
      background: rgba(238, 249, 241, 0.9); 
      border: 1px solid #c3e6cb; 
      padding: 15px; 
      border-radius: 8px; 
      margin-bottom: 20px; 
      text-align: center; 
      font-weight: bold; 
      color: #155724; 
      font-size: 15px; 
      line-height: 1.6;
      word-break: keep-all; 
    }
    
    .input-group { margin-bottom: 20px; position: relative; }
    
    label { display: flex; align-items: center; gap: 4px; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #333; }
    .icon-label { color: #2ea14c; font-size: 18px; }
    
    input[type="text"], input[type="email"] { 
      width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: rgba(255, 255, 255, 0.95); font-family: inherit; transition: 0.3s;
    }
    input:focus, select:focus { outline: none; border-color: #2ea14c; box-shadow: 0 0 0 3px rgba(46,161,76,0.2); }
    
    /* ★ はみ出しバグ修正済みのカレンダー＆プルダウン設定 */
    .date-time-btn { 
      width: 100%; 
      padding: 16px 40px 16px 16px; 
      border: 1px solid #c3e6cb; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: bold; 
      color: #155724; 
      background-color: rgba(238, 249, 241, 0.9); 
      text-align: left; 
      cursor: pointer; 
      appearance: none; 
      -webkit-appearance: none;
      font-family: inherit; 
      position: relative;
      box-sizing: border-box; /* ←★ ここがはみ出しを防ぐ絶対命令です！ */
    }

    input[type="date"].date-time-btn {
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
      caret-color: transparent;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    input[type="date"].date-time-btn::-webkit-calendar-picker-indicator {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      cursor: pointer;
      opacity: 0;
    }

    .date-input-wrap {
      position: relative;
      -webkit-user-select: none;
      user-select: none;
    }

    .date-input-wrap .date-time-btn {
      position: relative;
      z-index: 1;
    }

    .date-display {
      position: absolute;
      left: 16px;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      color: #155724;
      font-size: 16px;
      font-weight: bold;
      line-height: 1.4;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .input-icon-right {
      position: absolute;
      right: 15px;
      top: 42px;
      color: #2ea14c;
      pointer-events: none;
      font-size: 22px;
      z-index: 3;
    }

    .date-input-wrap .input-icon-right {
      top: 50%;
      transform: translateY(-50%);
    }
    
    .pulse-anim { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 161, 76, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(46, 161, 76, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 161, 76, 0); } }

    .btn { width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; }
    .btn-primary { background-color: #2ea14c; color: white; padding: 16px; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 10px rgba(46,161,76,0.3); }
    .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(46,161,76,0.3); }
    .btn-primary:disabled { background-color: #a0d8b0; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .btn-outline { background-color: transparent; border: 2px solid #2ea14c; color: #2ea14c; padding: 16px; font-size: 16px; width: 100%; margin-top: 10px; }
    .btn-outline-gray { background-color: transparent; border: 2px solid #666; color: #666; padding: 16px; font-size: 16px; width: 100%; margin-top: 10px; }
    
    .view-section { 
      display: none; 
      margin-top: 10px; 
      padding: 20px; 
      background: rgba(255,255,255,0.7); 
      border-radius: 8px; 
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
    }
    
    .notes { font-size: 13px; color: #d9534f; margin-bottom: 15px; text-align: center; font-weight: bold; background: rgba(253, 240, 240, 0.9); padding: 12px; border-radius: 8px; line-height: 1.4; border: 1px solid #f5c6cb; word-break: keep-all; }
    
    .reservation-rule { font-size: 12px; color: #444; text-align: center; margin-bottom: 8px; letter-spacing: 0.5px; font-weight: bold; word-break: keep-all; }

    .btn-rich-trial {
      position: relative;
      background: linear-gradient(135deg, #06c755 55%, #04a040 55%); 
      color: white;
      padding: 25px 15px; 
      border-radius: 12px;
      border: 3px solid #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 100%;
      margin-top: 10px;
      overflow: visible; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .btn-rich-trial:active { transform: translateY(3px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    
    .rich-badge {
      position: absolute;
      top: -20px; 
      right: -10px;
      font-size: 42px; 
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4)); 
      transform: rotate(0deg); 
    }
    
    .rich-top { 
      font-size: 22px; 
      font-weight: 900; 
      margin-bottom: 6px; 
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3); 
      letter-spacing: 1px; 
    }
    
    .rich-mid { 
      font-size: clamp(20px, 6.5vw, 28px); 
      font-weight: 900; 
      margin-bottom: 15px; 
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3); 
      letter-spacing: 1px; 
      line-height: 1.2; 
      width: 100%; 
      text-align: center;
      word-break: keep-all; 
    }
    
    .rich-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 2px solid #fff;
      border-radius: 40px; 
      padding: 10px 30px; 
      font-size: 18px; 
      font-weight: 900;
      background: rgba(255,255,255,0.2);
      word-break: keep-all;
    }

    .tap-circle {
      position: relative;
      width: 32px; 
      height: 32px; 
      background: #fff; 
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.4);
    }
    .tap-circle i { color: #06c755; font-size: 20px; } 

    #loadingBox { text-align: center; padding: 40px 0; }
    .spinner { margin: 0 auto 15px; width: 40px; height: 40px; border: 4px solid #eef9f1; border-top: 4px solid #2ea14c; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loadingText { font-weight: bold; color: #2ea14c; font-size: 16px; }
    .status-msg { text-align: center; margin-top: 20px; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>

<div class="container">
  <div id="loadingBox">
    <div class="spinner"></div>
    <div id="loadingText">システムを準備中...</div>
  </div>

  <div id="authArea" style="display:none;">
    <div class="header"><h1>たまフィット</h1></div>
    
    <div class="welcome-card">
      <span style="display: inline-block;">初めての方は</span><span style="display: inline-block;">「無料体験」を</span><span style="display: inline-block;">ご予約ください。</span>
    </div>

    <button class="btn btn-rich-trial" id="trialBtn" onclick="toggleView(this, 'trialFormView')">
      <div class="rich-badge">🔰</div>
      <span class="rich-top">初回60分</span>
      <span class="rich-mid"><span style="display: inline-block;">無料体験予約は</span><span style="display: inline-block;">こちら</span></span>
      <div class="rich-action">
        <div class="tap-circle"><i class="material-icons-round">touch_app</i></div>
        <span style="display: inline-block;">かんたん予約</span>
      </div>
    </button>
    
    <div id="trialFormView" class="view-section">
      <div class="input-group">
        <label><i class="material-icons-round icon-label">person</i> お名前</label>
        <input type="text" id="tName" placeholder="例：山田 太郎">
      </div>
      <div class="input-group">
        <label><i class="material-icons-round icon-label">sort_by_alpha</i> フリガナ</label>
        <input type="text" id="tKana" placeholder="例：ヤマダ タロウ">
      </div>
      
      <div class="input-group">
        <label><i class="material-icons-round icon-label">event</i> 予約希望日</label>
        <div class="date-input-wrap">
          <input type="date" id="tDate" class="date-time-btn pulse-anim" required onchange="updateDateDisplay('tDate'); loadSlots('trial')">
          <span class="date-display" id="tDateDisplay">日付を選択してください</span>
          <i class="material-icons-round input-icon-right">calendar_month</i>
        </div>
      </div>
      
      <div class="input-group">
        <label><i class="material-icons-round icon-label">schedule</i> 予約時間</label>
        <select id="tTime" class="date-time-btn"><option value="" disabled selected>日を選んでください</option></select>
        <i class="material-icons-round input-icon-right">expand_more</i>
      </div>
      
      <div class="notes"><span style="display: inline-block;">※無料体験は</span><span style="display: inline-block;">お一人様1回までと</span><span style="display: inline-block;">なります。</span></div>
      <div class="reservation-rule"><span style="display: inline-block;">当日予約不可 /</span> <span style="display: inline-block;">翌日予約は前日22:00締切</span></div>
      <button class="btn btn-primary" style="background-color: #20c997; font-size: 18px; padding: 18px;" id="tBtn" onclick="submitBooking('trial')">
        <i class="material-icons-round">send</i> 体験予約を確定する
      </button>
      <div id="trialStatusMsg" class="status-msg"></div> 
    </div>

    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed rgba(0,0,0,0.15);">
      <p style="font-size: 12px; color: #666; text-align: center; margin-bottom: 10px; font-weight: bold;">すでに会員の方・ご入会手続きのみの方</p>
      
      <button class="btn btn-outline" id="linkMainBtn" onclick="toggleView(this, 'linkView')">
        <i class="material-icons-round">login</i> 会員の方（ログイン）
      </button>
      <div id="linkView" class="view-section">
        <div class="input-group">
          <label><i class="material-icons-round icon-label">badge</i> 会員番号</label>
          <input type="text" id="linkId" placeholder="例: 25120001">
        </div>
        <div class="input-group">
          <label><i class="material-icons-round icon-label">person</i> お名前</label>
          <input type="text" id="linkName" placeholder="例: 山田 太郎">
        </div>
        <button class="btn btn-primary" id="linkBtn" onclick="linkMember()">
          <i class="material-icons-round">check_circle</i> ログインする
        </button>
      </div>

      <button class="btn btn-outline-gray" id="regMainBtn" onclick="toggleView(this, 'regView')">
        <i class="material-icons-round">person_add</i> 新規入会（登録のみ）
      </button>
      <div id="regView" class="view-section">
        <div class="input-group">
          <label><i class="material-icons-round icon-label">person</i> お名前</label>
          <input type="text" id="regName" placeholder="例: 山田 太郎">
        </div>
        <div class="input-group">
          <label><i class="material-icons-round icon-label">sort_by_alpha</i> フリガナ</label>
          <input type="text" id="regKana" placeholder="例: ヤマダ タロウ">
        </div>
        <button class="btn btn-primary" id="regBtn" onclick="registerMember()">
          <i class="material-icons-round">how_to_reg</i> 会員情報を登録する
        </button>
      </div>
    </div>
  </div>

  <div id="bookingArea" style="display:none;">
    <div class="header"><h1>会員様 予約</h1></div>
    <div class="welcome-card" id="welcomeMsg"></div>
    
    <div class="input-group">
      <label><i class="material-icons-round icon-label">event</i> 予約希望日</label>
      <div class="date-input-wrap">
        <input type="date" id="bookDate" class="date-time-btn pulse-anim" required onchange="updateDateDisplay('bookDate'); loadSlots('member')">
        <span class="date-display" id="bookDateDisplay">日付を選択してください</span>
        <i class="material-icons-round input-icon-right">calendar_month</i>
      </div>
    </div>
    
    <div class="input-group">
      <label><i class="material-icons-round icon-label">schedule</i> 予約時間</label>
      <select id="bookTime" class="date-time-btn"><option value="" disabled selected>日を選んでください</option></select>
      <i class="material-icons-round input-icon-right">expand_more</i>
    </div>
    
    <div class="reservation-rule"><span style="display: inline-block;">当日予約不可 /</span> <span style="display: inline-block;">翌日予約は前日22:00締切</span></div>
    <button class="btn btn-primary" id="bookBtn" onclick="submitBooking('member')">
      <i class="material-icons-round">send</i> 予約を確定する
    </button>
    <div id="statusMsg" class="status-msg"></div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwk--BBlH7rg_VF9WDfqlvcmloBydipwdK60CVEk1fvPunvSTvR5IkbMxNbyHhmSDuS/exec";
  const LIFF_ID = "2009803249-QQEbOzvg"; 
  
  let userProfile = null;
  let memberInfo = null;

  async function init() {
    const loadingBox = document.getElementById('loadingBox');
    const authArea = document.getElementById('authArea');
    
    const fallbackTimer = setTimeout(() => {
      loadingBox.style.display = 'none';
      authArea.style.display = 'block';
    }, 5000);

    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { clearTimeout(fallbackTimer); liff.login(); return; }
      
      try { userProfile = await liff.getProfile(); } catch (e) { console.warn('ID取得スキップ'); }
      
      let lineIdParam = userProfile ? userProfile.userId : "none";
      const res = await fetch(`${GAS_URL}?action=getMember&lineId=${lineIdParam}`);
      const result = await res.json();
      
      clearTimeout(fallbackTimer);
      loadingBox.style.display = 'none';
      
      if (result.success && result.member && result.member.name) { 
        showBooking(result.member); 
      } else { 
        authArea.style.display = 'block'; 
      }
    } catch (err) {
      clearTimeout(fallbackTimer);
      loadingBox.style.display = 'none';
      authArea.style.display = 'block';
    }
  }

  function toggleView(btnEl, viewId) {
    const targetForm = document.getElementById(viewId);
    
    const allForms = document.querySelectorAll('.view-section');
    allForms.forEach(f => {
      if (f.id !== viewId) f.style.display = 'none';
    });
    
    if (targetForm.style.display === 'block') {
      targetForm.style.display = 'none';
    } else {
      targetForm.style.display = 'block';
      setTimeout(() => targetForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }
  }

  function showBooking(m) {
    memberInfo = m;
    document.getElementById('authArea').style.display = 'none';
    document.getElementById('bookingArea').style.display = 'block';
    document.getElementById('welcomeMsg').innerHTML = `${m.name} 様<br>いつもご利用ありがとうございます！`;
  }

  const now = new Date();
  const minDate = new Date();
  
  if (now.getHours() >= 22) {
    minDate.setDate(now.getDate() + 2);
  } else {
    minDate.setDate(now.getDate() + 1);
  }

  const maxDate = new Date(now.getFullYear(), now.getMonth() + 2, 0);

  const formatDate = (d) => {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  };

  function updateDateDisplay(inputId) {
    const input = document.getElementById(inputId);
    const display = document.getElementById(inputId + 'Display');
    if (!input || !display) return;

    if (!input.value) {
      display.textContent = '日付を選択してください';
      return;
    }

    const parts = input.value.split('-');
    if (parts.length === 3) {
      display.textContent = `${parts[0]}/${parts[1]}/${parts[2]}`;
    } else {
      display.textContent = input.value;
    }
  }

  const minDateStr = formatDate(minDate);
  const maxDateStr = formatDate(maxDate);

  document.getElementById('bookDate').setAttribute('min', minDateStr);
  document.getElementById('bookDate').setAttribute('max', maxDateStr);
  document.getElementById('tDate').setAttribute('min', minDateStr);
  document.getElementById('tDate').setAttribute('max', maxDateStr);
  updateDateDisplay('bookDate');
  updateDateDisplay('tDate');

  async function loadSlots(mode) {
    const dateInput = (mode === 'member') ? document.getElementById('bookDate') : document.getElementById('tDate');
    const timeSelect = (mode === 'member') ? document.getElementById('bookTime') : document.getElementById('tTime');
    
    let planQuery = (mode === 'member' && memberInfo && memberInfo.plan) ? `&plan=${encodeURIComponent(memberInfo.plan)}` : "";
    
    timeSelect.innerHTML = '<option value="" disabled selected>確認中...</option>';
    try {
      const res = await fetch(`${GAS_URL}?date=${dateInput.value}${planQuery}`);
      const data = await res.json();
      timeSelect.innerHTML = '<option value="" disabled selected>時間を選択してください</option>';
      if(data.availableSlots && data.availableSlots.length > 0) {
        data.availableSlots.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; timeSelect.appendChild(o); });
      } else { timeSelect.innerHTML = '<option value="" disabled selected>空き枠なし</option>'; }
    } catch(e) { timeSelect.innerHTML = '<option value="" disabled selected>取得エラー</option>'; }
  }

  async function submitBooking(mode) {
    const isMember = (mode === 'member');
    const d = isMember ? document.getElementById('bookDate').value : document.getElementById('tDate').value;
    const t = isMember ? document.getElementById('bookTime').value : document.getElementById('tTime').value;
    const btn = isMember ? document.getElementById('bookBtn') : document.getElementById('tBtn');
    const defaultBtnText = btn.textContent;

    if(!d || !t) return alert("希望日と時間を選択してください。");
    btn.disabled = true; btn.textContent = "送信中...";

    const payload = {
      type: mode,
      name: isMember ? memberInfo.name : document.getElementById('tName').value,
      kana: isMember ? "" : document.getElementById('tKana').value,
      memberId: isMember ? memberInfo.memberId : "",
      lineId: userProfile ? userProfile.userId : "",
      lineName: userProfile ? userProfile.displayName : "取得失敗",
      date: d,
      time: t,
      plan: isMember ? (memberInfo.plan || "") : "", 
      menu: isMember ? (memberInfo.plan || "") : "体験希望" 
    };

    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
      const r = await res.json();
      if(r.status === "success") {
        await finishBooking(isMember); 
      } else { 
        alert("失敗: " + r.message); 
        btn.disabled = false; btn.textContent = defaultBtnText; 
      }
    } catch(e) { 
      alert("通信エラーが発生しました。予約が完了したか確認できないため、時間をおいて再度お試しください。");
      btn.disabled = false; btn.textContent = defaultBtnText;
    }
  }

  let trialConversionSent = false;

  function fireTrialConversionOnce() {
    if (trialConversionSent) return Promise.resolve();
    trialConversionSent = true;

    return new Promise((resolve) => {
      const done = () => resolve();
      setTimeout(done, 2200);

      if (typeof gtag !== 'function') {
        done();
        return;
      }

      gtag('event', 'conversion', {
        'send_to': 'AW-18078211726/ELYXCM-Q4aYCEI69rqxD',
        'event_callback': done,
        'event_timeout': 2000
      });
    });
  }

  async function finishBooking(isMember) {
    const msgArea = isMember ? document.getElementById('statusMsg') : document.getElementById('trialStatusMsg');
    
    msgArea.innerHTML = '<span style="color:#2ea14c; font-weight:bold;">リクエストを送信しました！<br>LINEの通知をご確認ください。</span>';

    if (!isMember) {
      await fireTrialConversionOnce();
    }

    if (liff.isInClient()) {
      liff.sendMessages([{
        type: 'text',
        text: '予約リクエストを送信しました！🕒'
      }]).then(() => {
        setTimeout(() => liff.closeWindow(), 2000);
      }).catch((err) => {
        setTimeout(() => liff.closeWindow(), 2000); 
      });
    } else {
      setTimeout(() => window.close(), 2500); 
    }
  }

  async function linkMember() {
    const id = document.getElementById('linkId').value.trim();
    const name = document.getElementById('linkName').value.trim();
    const btn = document.getElementById('linkBtn');
    if(!id || !name) return alert("入力してください。");
    btn.disabled = true;
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action:"linkMember", memberId:id, name:name, lineId:userProfile?userProfile.userId:"", lineName:userProfile?userProfile.displayName:"" }) });
      const r = await res.json();
      if(r.status === "success") { showBooking(r.member); } else { alert(r.message); }
    } catch(e) { alert("エラー"); }
    btn.disabled = false;
  }

  async function registerMember() {
    const name = document.getElementById('regName').value.trim();
    const kana = document.getElementById('regKana').value.trim();
    const btn = document.getElementById('regBtn');
    if(!name || !kana) return alert("入力してください。");
    btn.disabled = true;
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action:"registerMember", name:name, kana:kana, lineId:userProfile?userProfile.userId:"", lineName:userProfile?userProfile.displayName:"" }) });
      const r = await res.json();
      if(r.status === "success") { alert("登録完了！"); showBooking(r.member); } else { alert(r.message); }
    } catch(e) { alert("エラー"); }
    btn.disabled = false;
  }

  init();
</script>
</body>
