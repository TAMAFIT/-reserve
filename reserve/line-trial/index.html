<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たまフィット - 無料体験予約</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f7f9fa; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .form-container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
    .header { text-align: center; margin-bottom: 25px; }
    .header h1 { margin: 0; font-size: 24px; color: #1a1a1a; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #444; }
    input[type="text"] { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    .date-time-btn { width: 100%; padding: 16px; border: 1px solid #cce5ff; border-radius: 8px; font-size: 16px; font-weight: bold; color: #0056b3; background-color: #e6f2ff; text-align: center; cursor: pointer; }
    .submit-btn { width: 100%; background-color: #007bff; color: white; padding: 16px; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .submit-btn:disabled { background-color: #cccccc; }
    .notes { font-size: 13px; color: #d9534f; margin-bottom: 15px; text-align: center; font-weight: bold; background: #fdf0f0; padding: 12px; border-radius: 8px; line-height: 1.4; }
    #result-message { margin-top: 20px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="header">
      <h1>たまフィット</h1>
      <p>無料体験トレーニング予約</p>
    </div>
    <form id="bookingForm">
      <div class="form-group">
        <label for="name">お名前（フルネーム）</label>
        <input type="text" id="name" placeholder="例：山田 太郎" required>
      </div>
      <div class="form-group">
        <label for="kana">フリガナ（カタカナ）</label>
        <input type="text" id="kana" placeholder="例：ヤマダ タロウ" pattern="^[ァ-ヶー\s　]+$" required>
      </div>
      <div class="form-group">
        <label for="date">予約希望日</label>
        <input type="date" id="date" class="date-time-btn" required>
      </div>
      <div class="form-group">
        <label for="time">予約時間（60分）</label>
        <select id="time" class="date-time-btn" required>
          <option value="" disabled selected>希望日を選んでください</option>
        </select>
      </div>
      <div class="notes">※無料体験はお一人様1回までとなります。</div>
      <button type="submit" class="submit-btn" id="submitBtn">予約を確定する</button>
    </form>
    <div id="result-message"></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwk--BBlH7rg_VF9WDfqlvcmloBydipwdK60CVEk1fvPunvSTvR5IkbMxNbyHhmSDuS/exec";
    const LIFF_ID = "2009803249-CIxxO6HC";
    let lineProfile = null;

    async function initLIFF() {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) { lineProfile = await liff.getProfile(); } else { liff.login(); }
    }
    window.addEventListener('load', initLIFF);

    const dateInput = document.getElementById('date');
    const timeSelect = document.getElementById('time');

    dateInput.addEventListener('change', async () => {
      if (dateInput.value) {
        timeSelect.innerHTML = '<option value="" disabled selected>確認中...</option>';
        const response = await fetch(`${GAS_URL}?date=${dateInput.value}`);
        const data = await response.json();
        if (data.availableSlots && data.availableSlots.length > 0) {
          timeSelect.innerHTML = '<option value="" disabled selected>時間を選択してください</option>';
          data.availableSlots.forEach(slot => {
            const opt = document.createElement('option');
            opt.value = slot; opt.textContent = slot;
            timeSelect.appendChild(opt);
          });
        } else {
          timeSelect.innerHTML = '<option value="" disabled selected>予約がいっぱいです</option>';
        }
      }
    });

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = "送信中...";

      const payload = {
        type: "trial",
        name: document.getElementById('name').value,
        kana: document.getElementById('kana').value,
        email: "LINE予約", // メール不要のため固定値
        lineName: lineProfile ? lineProfile.displayName : "なし",
        lineId: lineProfile ? lineProfile.userId : "なし",
        date: dateInput.value,
        time: timeSelect.value,
        menu: "体験希望"
      };

      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") {
          document.getElementById('result-message').innerHTML = '<span style="color:green">予約完了！LINEをご確認ください。</span>';
          setTimeout(() => { if (liff.isInClient()) liff.closeWindow(); }, 2000);
        }
      } catch (err) { alert("エラーが発生しました。"); btn.disabled = false; }
    });
    dateInput.setAttribute('min', new Date().toISOString().split('T')[0]);
  </script>
</body>
</html>
